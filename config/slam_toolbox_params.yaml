slam_toolbox:
  ros__parameters:
    # Frame Overrides
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan

    # Hand-held Motion Tuning
    mode: mapping
    use_scan_matching: true
    # Set to 0.0 because odom->base_link is a static identity transform (no real odometry).
    # A non-zero threshold would cause SLAM Toolbox to skip every scan since odometry
    # always reports zero travel distance.
    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0

    # Scan Matcher Search Space
    # With no odometry there is no motion prior, so the search window must be wide enough
    # to cover the distance moved between consecutive scans.
    # 0.5m is sufficient for a slow-moving cart (~10Hz scans, slow speed = small displacement).
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop Closure — corrects accumulated drift when you revisit a mapped area
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 10
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Fast Processing for smooth maps
    map_update_interval: 1.0  # seconds between occupancy grid publishes (default is ~20s)
    scan_queue_size: 1
    transform_timeout: 0.2
    minimum_laser_range: 0.3
    maximum_laser_range: 10.0